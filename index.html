<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Swipe Keyboard POC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      height: 100dvh;
      height: 100vh; /* fallback */
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100dvh;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      touch-action: none;
      user-select: none;
    }

    #text-display {
      flex: 1;
      padding: 24px;
      font-size: 24px;
      line-height: 1.6;
      background: #16213e;
      overflow-y: auto;
    }
    #text-display .cursor {
      display: inline-block;
      width: 2px;
      height: 1.2em;
      background: #4fc3f7;
      animation: blink 1s infinite;
      vertical-align: text-bottom;
    }
    @keyframes blink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0; } }


    #keyboard {
      background: #0f3460;
      padding: 6px 4px calc(env(safe-area-inset-bottom, 0px) + 8px);
      position: relative;
      flex-shrink: 0;
    }

    #status-bar {
      text-align: center;
      padding: 4px;
      font-size: 12px;
      color: #888;
      background: #0a0a2e;
      flex-shrink: 0;
    }

    .kb-row {
      display: flex;
      justify-content: center;
      margin: 3px 0;
      gap: 4px;
    }

    .key {
      min-width: 32px;
      height: 46px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 500;
      background: #1a1a4e;
      color: #eee;
      cursor: pointer;
      transition: all 0.12s;
      position: relative;
      flex: 1;
      max-width: 42px;
    }
    .key:active, .key.active {
      background: #4fc3f7;
      color: #111;
      transform: scale(1.1);
      z-index: 2;
    }
    .key.predict {
      background: #2e7d32;
      color: #fff;
      max-width: none;
      flex: 1;
    }
    .key.predict:active, .key.predict.active {
      background: #66bb6a;
      color: #111;
    }
    .key.predict.visited {
      background: #1b5e20;
      color: #aaa;
    }
    .key.predict.word-key {
      background: #1565c0;
      font-size: 13px;
      min-width: 50px;
      flex: 1.5;
      letter-spacing: -0.3px;
    }
    .key.predict.word-key:active, .key.predict.word-key.active {
      background: #42a5f5;
      color: #111;
    }
    /* Swipe direction arrows */
    .swipe-arrow {
      text-align: center;
      font-size: 14px;
      color: transparent;
      height: 0;
      line-height: 16px;
      overflow: visible;
      transition: all 0.2s;
      pointer-events: none;
      z-index: 5;
      position: relative;
    }
    .swipe-arrow.visible {
      color: #4fc3f7;
      height: 16px;
      animation: pulseArrow 1s ease-in-out infinite;
    }
    @keyframes pulseArrow {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* Glow on active prediction row */
    .kb-row.glow {
      animation: rowGlow 0.6s ease-out;
    }
    @keyframes rowGlow {
      0% { box-shadow: 0 0 15px rgba(79, 195, 247, 0.6); }
      100% { box-shadow: none; }
    }

    .key.action {
      background: #2a2a5e;
      font-size: 14px;
      min-width: 50px;
      max-width: 70px;
    }
    .key.space {
      flex: 4;
      max-width: 220px;
      font-size: 14px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    .key .key-label {
      position: relative;
      z-index: 1;
    }

    /* Swipe indicator */
    #swipe-indicator {
      position: fixed;
      pointer-events: none;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(79, 195, 247, 0.3);
      border: 2px solid #4fc3f7;
      transform: translate(-50%, -50%);
      display: none;
      z-index: 100;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: bold;
    }
    #swipe-indicator.visible {
      display: flex;
    }

    #current-input {
      display: inline;
      color: #4fc3f7;
      text-decoration: underline;
    }

  </style>
</head>
<body>

<div id="text-display">
  <span id="typed-text"></span><span id="current-input"></span><span class="cursor"></span>
</div>

<div id="keyboard">
  <div id="predict-top" class="kb-row"></div>
  <div id="arrow-up" class="swipe-arrow arrow-up">&#9650;</div>
  <div id="row-top" class="kb-row"></div>
  <div id="row-mid" class="kb-row"></div>
  <div id="row-bot" class="kb-row"></div>
  <div id="arrow-down" class="swipe-arrow arrow-down">&#9660;</div>
  <div id="predict-bot" class="kb-row"></div>
  <div class="kb-row">
    <div class="key action" data-action="backspace">&#9003;</div>
    <div class="key space" data-action="space">space</div>
    <div class="key action" data-action="enter">&#9166;</div>
  </div>
</div>

<div id="status-bar">Tap a letter to start, then swipe to predicted letters</div>

<div id="swipe-indicator"></div>

<script src="words.js"></script>

// ---- Word corpus: loaded from words.js (10k most common English words) ----

// ---- Prefix-aware prediction engine ----
// Pre-build a trie-like index for fast prefix lookups
const prefixIndex = new Map();

function buildPrefixIndex() {
  // Deduplicate while preserving order (earlier = more common)
  const seen = new Set();
  const unique = [];
  for (const w of WORDS) {
    const lw = w.toLowerCase();
    if (!seen.has(lw) && /^[a-z]+$/.test(lw)) {
      seen.add(lw);
      unique.push(lw);
    }
  }

  // Weight by frequency rank — word at index 0 counts more than word at index 9999
  for (let wi = 0; wi < unique.length; wi++) {
    const word = unique[wi];
    const weight = Math.max(1, Math.round(100 * (1 - wi / unique.length)));
    for (let i = 0; i < word.length - 1; i++) {
      const prefix = word.slice(0, i + 1);
      const nextChar = word[i + 1];
      if (!prefixIndex.has(prefix)) {
        prefixIndex.set(prefix, new Map());
      }
      const counts = prefixIndex.get(prefix);
      counts.set(nextChar, (counts.get(nextChar) || 0) + weight);
    }
  }
}

buildPrefixIndex();

// Get predicted next letters for a given prefix, ranked by frequency
function getPredictions(prefix) {
  prefix = prefix.toLowerCase();
  const counts = prefixIndex.get(prefix);
  if (!counts || counts.size === 0) {
    // Fallback: use last character's predictions
    const lastChar = prefix[prefix.length - 1];
    const fallback = prefixIndex.get(lastChar);
    if (!fallback) return 'etaoinsrhld'.split('');
    return [...fallback.entries()]
      .sort((a, b) => b[1] - a[1])
      .map(([ch]) => ch)
      .slice(0, 10);
  }
  return [...counts.entries()]
    .sort((a, b) => b[1] - a[1])
    .map(([ch]) => ch)
    .slice(0, 10);
}

// Build a frequency-ordered unique word list once at init
const WORDS_BY_FREQ = (() => {
  const seen = new Set();
  const result = [];
  for (const w of WORDS) {
    const lw = w.toLowerCase();
    if (!seen.has(lw) && /^[a-z]+$/.test(lw)) {
      seen.add(lw);
      result.push(lw);
    }
  }
  return result;
})();

// Get word completions for a prefix, ranked by frequency
function getWordCompletions(prefix) {
  prefix = prefix.toLowerCase();
  return WORDS_BY_FREQ
    .filter(w => w.startsWith(prefix) && w !== prefix)
    .slice(0, 8);
}

// Get predicted next words based on previous word
function getNextWordPredictions(prevWord) {
  if (!prevWord) return [];
  return WORD_BIGRAMS[prevWord.toLowerCase()] || [];
}

// Get letter predictions boosted by word context
function getContextualPredictions(prefix, prevWord) {
  prefix = prefix.toLowerCase();

  // Get base predictions from prefix index
  const baseCounts = prefixIndex.get(prefix);
  const merged = new Map();

  if (baseCounts) {
    for (const [ch, count] of baseCounts) {
      merged.set(ch, count);
    }
  }

  // Boost letters that start predicted next words
  if (prevWord && prefix.length <= 2) {
    const nextWords = getNextWordPredictions(prevWord);
    for (let i = 0; i < nextWords.length; i++) {
      const w = nextWords[i];
      if (w.startsWith(prefix)) {
        const nextChar = w[prefix.length];
        if (nextChar) {
          const boost = Math.round(200 * (1 - i / nextWords.length));
          merged.set(nextChar, (merged.get(nextChar) || 0) + boost);
        }
      }
    }
  }

  // Boost letters from top word completions — scale boost relative to
  // the highest count so common words always surface their next letter
  const completions = getWordCompletions(prefix);
  if (completions.length > 0) {
    const maxCount = merged.size > 0 ? Math.max(...merged.values()) : 100;
    for (let i = 0; i < Math.min(5, completions.length); i++) {
      const w = completions[i];
      const nextChar = w[prefix.length];
      if (nextChar) {
        // #1 completion gets 70% of max count, #2 gets 56%, etc.
        const boost = Math.round(maxCount * 0.7 * (1 - i / 5));
        merged.set(nextChar, (merged.get(nextChar) || 0) + boost);
      }
    }
  }

  if (merged.size === 0) {
    return 'etaoinsrhld'.split('');
  }

  return [...merged.entries()]
    .sort((a, b) => b[1] - a[1])
    .map(([ch]) => ch)
    .slice(0, 10);
}

// ---- State ----
let typedText = '';
let currentInput = '';
let lastWord = ''; // track previous completed word
let mode = 'qwerty'; // 'qwerty' or 'predict'

function isStartOfSentence() {
  if (typedText.length === 0) return true;
  const trimmed = typedText.trimEnd();
  if (trimmed.length === 0) return true;
  const lastChar = trimmed[trimmed.length - 1];
  return '.!?\n'.includes(lastChar);
}

function displayWord(word) {
  // Always capitalize "I"
  if (word.toLowerCase() === 'i') return 'I';
  // Capitalize first letter at start of sentence
  if (isStartOfSentence() && currentInput.length === 0) {
    return word.charAt(0).toUpperCase() + word.slice(1);
  }
  return word;
}
let swipeDirection = null; // 'top' or 'bot' — which predict row the user last swiped to

const QWERTY_TOP = 'qwertyuiop'.split('');
const QWERTY_MID = 'asdfghjkl'.split('');
const QWERTY_BOT = 'zxcvbnm'.split('');

// ---- Common starting/fallback words ----
const STARTER_WORDS_TOP = ['the','i','a','it','is'];
const STARTER_WORDS_BOT = ['we','you','this','my','so'];
const FALLBACK_WORDS = ['the','and','to','a','is','in','it','of','that','for','you','was','with','on','i','this','have','not','are','but'];

// ---- Rendering ----
function renderQwerty() {
  mode = 'qwerty';

  // Use next-word predictions if available, otherwise common starters
  const nextWords = getNextWordPredictions(lastWord);
  let topWords, botWords;

  if (nextWords.length >= 6) {
    topWords = nextWords.slice(0, 5);
    botWords = nextWords.slice(5, 10);
  } else if (nextWords.length > 0) {
    topWords = nextWords.slice(0, Math.min(5, nextWords.length));
    botWords = STARTER_WORDS_BOT.slice(0, 5);
  } else {
    topWords = STARTER_WORDS_TOP;
    botWords = STARTER_WORDS_BOT;
  }

  const topItems = topWords.map(w => ({ type: 'word', value: w }));
  const botItems = botWords.map(w => ({ type: 'word', value: w }));

  if (isSwiping && swipeDirection) {
    // During swipe: put next-word predictions on opposite row
    const allItems = [...topItems, ...botItems];
    const targetRow = swipeDirection === 'top' ? 'predict-bot' : 'predict-top';
    const staleRow = swipeDirection === 'top' ? 'predict-top' : 'predict-bot';
    renderPredictRow(targetRow, allItems.slice(0, 5));
    renderPredictRow(staleRow, allItems.slice(5, 10));
  } else {
    renderPredictRow('predict-top', topItems);
    renderPredictRow('predict-bot', botItems);
  }

  renderRow('row-top', QWERTY_TOP, false);
  renderRow('row-mid', QWERTY_MID, false);
  renderRow('row-bot', QWERTY_BOT, false);
  updateArrows(false, false);
  updateStatus('Tap a letter or word to start');
}

function renderRow(rowId, letters, isPredict) {
  const row = document.getElementById(rowId);
  row.innerHTML = letters.map(l =>
    `<div class="key ${isPredict ? 'predict' : ''}" data-letter="${l}">
      <span class="key-label">${l}</span>
    </div>`
  ).join('');
}

function renderPredictRow(rowId, items) {
  const row = document.getElementById(rowId);
  if (items.length === 0) {
    row.innerHTML = '<div class="key predict" style="visibility:hidden;flex:1;max-width:none;">&nbsp;</div>';
    row.classList.remove('glow');
    return;
  }
  row.innerHTML = items.map(item => {
    if (item.type === 'word') {
      const label = displayWord(item.value);
      return `<div class="key predict word-key" data-word="${item.value}">
        <span class="key-label">${label}</span>
      </div>`;
    }
    return `<div class="key predict" data-letter="${item.value}">
      <span class="key-label">${item.value}</span>
    </div>`;
  }).join('');
  // Trigger glow animation
  row.classList.remove('glow');
  void row.offsetWidth; // force reflow to restart animation
  row.classList.add('glow');
}

function updateArrows(showTop, showBot) {
  const arrowUp = document.getElementById('arrow-up');
  const arrowDown = document.getElementById('arrow-down');
  arrowUp.classList.toggle('visible', showTop);
  arrowDown.classList.toggle('visible', showBot);
}

function renderPredictions(fromQwertyRow) {
  mode = 'predict';
  const preds = getContextualPredictions(currentInput, lastWord);

  // Get word completions
  const prefix = currentInput.toLowerCase();
  const bigramWords = getNextWordPredictions(lastWord)
    .filter(w => w.startsWith(prefix) && w !== prefix);
  const generalWords = getWordCompletions(currentInput)
    .filter(w => !bigramWords.includes(w));
  const words = [...bigramWords, ...generalWords].slice(0, 4);

  // Build prediction items: letters + words
  const allItems = [];
  for (let i = 0; i < Math.min(5, preds.length); i++) {
    allItems.push({ type: 'letter', value: preds[i] });
  }
  for (let i = 0; i < Math.min(3, words.length); i++) {
    allItems.push({ type: 'word', value: words[i] });
  }

  // Determine which row the letter came from
  let sourceRow = fromQwertyRow || null;
  if (!sourceRow && isSwiping && swipeDirection) {
    sourceRow = swipeDirection;
  }
  if (!sourceRow) {
    // Figure it out from the last letter typed
    const lastLetter = currentInput[currentInput.length - 1];
    if (QWERTY_TOP.includes(lastLetter)) sourceRow = 'top';
    else if (QWERTY_BOT.includes(lastLetter)) sourceRow = 'bot';
    else sourceRow = 'mid';
  }

  const emptyItems = [];

  if (sourceRow === 'top') {
    // Came from top QWERTY row — only show predictions on bottom
    renderPredictRow('predict-top', emptyItems);
    renderPredictRow('predict-bot', allItems.slice(0, 5));
    updateArrows(false, true);
  } else if (sourceRow === 'bot') {
    // Came from bottom QWERTY row — only show predictions on top
    renderPredictRow('predict-top', allItems.slice(0, 5));
    renderPredictRow('predict-bot', emptyItems);
    updateArrows(true, false);
  } else {
    // Came from middle row or prediction row — show on both
    const topItems = allItems.slice(0, Math.min(5, allItems.length));
    const botItems = allItems.slice(5, 8);
    renderPredictRow('predict-top', topItems);
    renderPredictRow('predict-bot', botItems);
    updateArrows(true, true);
  }

  renderRow('row-top', QWERTY_TOP, false);
  renderRow('row-mid', QWERTY_MID, false);
  renderRow('row-bot', QWERTY_BOT, false);

  updateStatus(`"${currentInput}" → ${preds.slice(0, 6).join(', ')}`);
}

function updateDisplay() {
  document.getElementById('typed-text').textContent = typedText;
  document.getElementById('current-input').textContent = currentInput;
}

function updateStatus(msg) {
  document.getElementById('status-bar').textContent = msg;
}


function selectLetter(letter, fromQwertyRow) {
  currentInput += letter;
  updateDisplay();
  renderPredictions(fromQwertyRow);
}

function commitWord(word, fromRow) {
  let output = word.toLowerCase();
  // Always capitalize "I"
  if (output === 'i') output = 'I';
  // Capitalize at start of sentence
  else if (isStartOfSentence() && currentInput.length <= word.length) {
    output = output.charAt(0).toUpperCase() + output.slice(1);
  }
  typedText += output + ' ';
  lastWord = word.toLowerCase();
  currentInput = '';
  updateDisplay();

  if (fromRow) {
    // Came from a prediction row — show next predictions on opposite row, clear this one
    const nextWords = getNextWordPredictions(lastWord);
    const items = nextWords.slice(0, 5).map(w => ({ type: 'word', value: w }));
    const emptyRow = [];

    if (fromRow === 'top') {
      renderPredictRow('predict-top', emptyRow);
      renderPredictRow('predict-bot', items);
      updateArrows(false, items.length > 0);
    } else {
      renderPredictRow('predict-top', items);
      renderPredictRow('predict-bot', emptyRow);
      updateArrows(items.length > 0, false);
    }
    renderRow('row-top', QWERTY_TOP, false);
    renderRow('row-mid', QWERTY_MID, false);
    renderRow('row-bot', QWERTY_BOT, false);
    mode = 'qwerty';
  } else {
    renderQwerty();
  }
}

function handleBackspace() {
  if (currentInput.length > 0) {
    currentInput = currentInput.slice(0, -1);
    updateDisplay();
    if (currentInput.length === 0) {
      renderQwerty();
    } else {
      renderPredictions();
    }
  } else if (typedText.length > 0) {
    // Remove last character or word
    typedText = typedText.trimEnd();
    if (typedText.length > 0) {
      // Find last space to go back a word
      const lastSpace = typedText.lastIndexOf(' ');
      if (lastSpace >= 0) {
        typedText = typedText.slice(0, lastSpace + 1);
      } else {
        typedText = '';
      }
    }
    updateDisplay();
  }
}

function handleSpace() {
  if (currentInput.length > 0) {
    commitWord(currentInput);
  } else {
    typedText += ' ';
    updateDisplay();
  }
}

function handleEnter() {
  if (currentInput.length > 0) {
    commitWord(currentInput);
  }
  typedText += '\n';
  updateDisplay();
}

// ---- Event handling ----
function handleKeyTap(el) {
  const letter = el.dataset.letter;
  const action = el.dataset.action;
  const word = el.dataset.word;

  if (word) {
    commitWord(word);
    return;
  }

  if (action === 'backspace') { handleBackspace(); return; }
  if (action === 'space') { handleSpace(); return; }
  if (action === 'enter') { handleEnter(); return; }

  if (letter) {
    selectLetter(letter);
  }
}

// ---- Swipe engine ----
let isSwiping = false;
let swipeLetterCount = 0; // how many letters picked up during this swipe
let lastSwipeKey = null;  // DOM element for visual state
let lastSwipeValue = null; // letter/word value to prevent re-triggering after re-render
let swipeStartX = 0;
let swipeStartY = 0;
let lastPickupTime = 0; // timestamp of last letter pickup
const SWIPE_THRESHOLD = 30; // pixels before swipe activates
const PICKUP_COOLDOWN = 200; // ms to wait after each pickup before allowing next

function getKeyAtPoint(x, y) {
  const el = document.elementFromPoint(x, y);
  if (!el) return null;
  return el.closest('.key');
}

const keyboard = document.getElementById('keyboard');

keyboard.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  keyboard.setPointerCapture(e.pointerId);

  const key = getKeyAtPoint(e.clientX, e.clientY);
  if (!key) return;

  const action = key.dataset.action;
  if (action) {
    key.classList.add('active');
    if (action === 'backspace') handleBackspace();
    else if (action === 'space') handleSpace();
    else if (action === 'enter') handleEnter();
    setTimeout(() => key.classList.remove('active'), 120);
    return;
  }

  const letter = key.dataset.letter;
  const word = key.dataset.word;

  // Tapping a word key — commit it and start a swipe session for chaining
  if (word) {
    key.classList.add('active');
    let fromRow = null;
    if (key.closest('#predict-top')) fromRow = 'top';
    else if (key.closest('#predict-bot')) fromRow = 'bot';
    swipeDirection = fromRow;
    commitWord(word, fromRow);
    setTimeout(() => key.classList.remove('active'), 120);
    // Start swipe session so user can continue swiping to next word
    isSwiping = true;
    swipeStartX = e.clientX;
    swipeStartY = e.clientY;
    lastPickupTime = Date.now();
    swipeLetterCount = 1;
    lastSwipeKey = null;
    lastSwipeValue = null;
    return;
  }

  if (!letter) return;

  // Detect which QWERTY row this letter is in
  let qwertyRow = null;
  if (key.closest('#row-top')) qwertyRow = 'top';
  else if (key.closest('#row-bot')) qwertyRow = 'bot';
  else if (key.closest('#row-mid')) qwertyRow = 'mid';

  // Start swiping
  isSwiping = true;
  swipeStartX = e.clientX;
  swipeStartY = e.clientY;
  lastPickupTime = Date.now();
  swipeLetterCount = 1;
  lastSwipeKey = key;
  lastSwipeValue = letter;

  document.querySelectorAll('.key.active').forEach(k => k.classList.remove('active'));
  key.classList.add('active');
  selectLetter(letter, qwertyRow);
});

keyboard.addEventListener('pointermove', (e) => {
  if (!isSwiping) return;
  e.preventDefault();

  // Require both minimum distance AND cooldown time since last pickup
  const dx = e.clientX - swipeStartX;
  const dy = e.clientY - swipeStartY;
  if (Math.sqrt(dx * dx + dy * dy) < SWIPE_THRESHOLD) return;
  if (Date.now() - lastPickupTime < PICKUP_COOLDOWN) return;

  const key = getKeyAtPoint(e.clientX, e.clientY);
  if (!key) return;

  // Check by value, not DOM element (elements get replaced on re-render)
  const keyValue = key.dataset.letter || key.dataset.word || null;
  if (!keyValue || keyValue === lastSwipeValue) return;

  // Only pick up prediction keys while swiping (green/blue keys)
  if (!key.classList.contains('predict')) return;

  const letter = key.dataset.letter;
  const word = key.dataset.word;

  // Mark previous key as visited (trail)
  if (lastSwipeKey && lastSwipeKey.parentNode) lastSwipeKey.classList.add('visited');
  lastSwipeKey = key;
  lastSwipeValue = keyValue;

  document.querySelectorAll('.key.active').forEach(k => k.classList.remove('active'));
  key.classList.add('active');

  if (word) {
    // Swiped to a word completion — commit it immediately
    swipeStartX = e.clientX;
    swipeStartY = e.clientY;
    if (key.closest('#predict-top')) swipeDirection = 'top';
    else if (key.closest('#predict-bot')) swipeDirection = 'bot';
    lastPickupTime = Date.now();
    document.querySelectorAll('.key.visited').forEach(k => k.classList.remove('visited'));
    document.querySelectorAll('.key.active').forEach(k => k.classList.remove('active'));
    commitWord(word, swipeDirection);
    lastSwipeKey = null;
    lastSwipeValue = null;
    // Keep isSwiping true — user can continue swiping to next word predictions
    return;
  }

  if (letter) {
    swipeLetterCount++;
    swipeStartX = e.clientX;
    swipeStartY = e.clientY;
    lastPickupTime = Date.now();
    // Track which prediction row the user swiped to
    if (key.closest('#predict-top')) swipeDirection = 'top';
    else if (key.closest('#predict-bot')) swipeDirection = 'bot';
    selectLetter(letter, swipeDirection);
  }
});

keyboard.addEventListener('pointerup', (e) => {
  if (!isSwiping) return;
  e.preventDefault();

  document.querySelectorAll('.key.active').forEach(k => k.classList.remove('active'));
  document.querySelectorAll('.key.visited').forEach(k => k.classList.remove('visited'));

  // If we swiped through at least 2 letters (initial + 1 prediction),
  // auto-commit the word with auto-space. Single taps don't auto-commit.
  if (swipeLetterCount >= 2 && currentInput.length >= 2) {
    commitWord(currentInput);
  }

  isSwiping = false;
  swipeLetterCount = 0;
  lastSwipeKey = null;
  lastSwipeValue = null;
  swipeDirection = null;
});

keyboard.addEventListener('pointercancel', (e) => {
  isSwiping = false;
  swipeLetterCount = 0;
  lastSwipeKey = null;
  lastSwipeValue = null;
  swipeDirection = null;
  document.querySelectorAll('.key.active').forEach(k => k.classList.remove('active'));
});


// Keyboard input for desktop testing
document.addEventListener('keydown', (e) => {
  if (e.key === 'Backspace') {
    e.preventDefault();
    handleBackspace();
  } else if (e.key === ' ') {
    e.preventDefault();
    handleSpace();
  } else if (e.key === 'Enter') {
    e.preventDefault();
    handleEnter();
  } else if (e.key.length === 1 && /[a-z]/i.test(e.key)) {
    const lk = e.key.toLowerCase();
    let row = 'mid';
    if (QWERTY_TOP.includes(lk)) row = 'top';
    else if (QWERTY_BOT.includes(lk)) row = 'bot';
    selectLetter(lk, row);
  }
});

// ---- Init ----
renderQwerty();
updateDisplay();
</script>
